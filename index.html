<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress</title>
    <script src="https://cdn.jsdelivr.net/npm/midi-writer-js@2.1.4/browser/midiwriter.js"></script>
    <script type="module" src="progressmain.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Progress</h1>
    <p>Build neuroharmonic chord progressions</p>

    <div class="panel">
        <h3>1. Select Key: <span id="key-display">C Major</span></h3>
        <select id="key-selector">
            <option value="60">C Major</option>
            <option value="61">C♯/D♭ Major</option>
            <option value="62">D Major</option>
            <option value="63">D♯/E♭ Major</option>
            <option value="64">E Major</option>
            <option value="65">F Major</option>
            <option value="66">F♯/G♭ Major</option>
            <option value="67">G Major</option>
            <option value="68">G♯/A♭ Major</option>
            <option value="69">A Major</option>
            <option value="70">A♯/B♭ Major</option>
            <option value="71">B Major</option>
        </select>
    </div>

    <div class="panel">
        <h3>2. Build Progression</h3>
        <div>
            <strong>Diatonic:</strong>
            <button class="chord-btn" data-chord="I">I</button>
            <button class="chord-btn" data-chord="ii">ii</button>
            <button class="chord-btn" data-chord="iii">iii</button>
            <button class="chord-btn" data-chord="IV">IV</button>
            <button class="chord-btn" data-chord="V">V</button>
            <button class="chord-btn" data-chord="vi">vi</button>
        </div>
        <div style="margin-top: 10px;">
            <strong>Borrowed (Modal Mixture):</strong>
            <button class="chord-btn borrowed" data-chord="iv">iv</button>
            <button class="chord-btn borrowed" data-chord="bVI">♭VI</button>
            <button class="chord-btn borrowed" data-chord="bVII">♭VII</button>
        </div>

        <div id="progression-display"></div>
    </div>

    <div class="panel controls">
        <button class="control-btn primary" id="btn-play-toggle" title="Play/Stop">▶</button>
        <button class="control-btn primary" id="btn-loop-toggle" title="Toggle Loop">🔁</button>
        <button class="control-btn primary" id="btn-clear" title="Clear Progression">🗑</button>
        <label>
            <strong>BPM:</strong>
            <input type="number" id="bpm-slider" value="90" min="40" max="240" style="width: 60px;">
        </label>
        <label>
            <input type="checkbox" id="voice-leading" checked> 
            <strong>Minimize note movement between chords</strong>
        </label>
        <button class="control-btn primary" id="btn-export">⤓ Download MIDI</button>
    </div>

</body>
</html>
