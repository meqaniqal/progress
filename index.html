<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress</title>
    <script src="https://cdn.jsdelivr.net/npm/midi-writer-js@2.1.4/browser/midiwriter.js"></script>
    <script type="module" src="progressmain.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Progress</h1>
    <p>Build neuroharmonic chord progressions</p>

    <div class="panel">
        <h3>1. Select Key (Default: C Major)</h3>
        <p><em>Currently locked to C Major/A Minor</em></p>
    </div>

    <div class="panel">
        <h3>2. Build Progression</h3>
        <div>
            <strong>Diatonic:</strong>
            <button class="chord-btn" data-chord="I">I (C Maj)</button>
            <button class="chord-btn" data-chord="ii">ii (D Min)</button>
            <button class="chord-btn" data-chord="iii">iii (E Min)</button>
            <button class="chord-btn" data-chord="IV">IV (F Maj)</button>
            <button class="chord-btn" data-chord="V">V (G Maj)</button>
            <button class="chord-btn" data-chord="vi">vi (A Min)</button>
        </div>
        <div style="margin-top: 10px;">
            <strong>Borrowed (Modal Mixture):</strong>
            <button class="chord-btn borrowed" data-chord="iv">iv (F Min)</button>
            <button class="chord-btn borrowed" data-chord="bVI">♭VI (Ab Maj)</button>
            <button class="chord-btn borrowed" data-chord="bVII">♭VII (Bb Maj)</button>
        </div>

        <div id="progression-display"></div>
    </div>

    <div class="panel controls">
        <button class="export" id="btn-play" style="background: #3b82f6;">Play</button>
        <button class="export" id="btn-stop" style="background: #ef4444;">Stop</button>
        <button class="export" id="btn-clear" style="background: #f59e0b;">Clear</button>
        <label>
            <strong>BPM:</strong>
            <input type="number" id="bpm-slider" value="90" min="40" max="240" style="width: 60px;">
        </label>
        <label>
            <input type="checkbox" id="loop-playback"> 
            <strong>Loop</strong>
        </label>
        <label>
            <input type="checkbox" id="voice-leading" checked> 
            <strong>Apply Voice Leading</strong> (Minimizes note movement between chords)
        </label>
        <button class="export" id="btn-export">Download MIDI</button>
    </div>

</body>
</html>
