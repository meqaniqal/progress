<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melody Generator - 6-Pass Pipeline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #00d4ff;
      margin-bottom: 20px;
      font-size: 1.8rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .input-panel {
      background: #16213e;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #0f3460;
    }

    .input-panel h2 {
      color: #00d4ff;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    .form-row {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group label {
      font-size: 0.85rem;
      color: #a0a0a0;
    }

    input, select {
      background: #0f3460;
      border: 1px solid #1a1a4e;
      color: #e0e0e0;
      padding: 8px 12px;
      border-radius: 5px;
      font-size: 0.9rem;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #00d4ff;
    }

    button {
      background: #00d4ff;
      color: #1a1a2e;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    button:hover {
      background: #00a8cc;
    }

    button.secondary {
      background: #e94560;
      color: white;
    }

    button.secondary:hover {
      background: #c73e50;
    }

    button.small {
      padding: 4px 10px;
      font-size: 0.8rem;
    }

    .chord-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .chord-chip {
      background: #0f3460;
      padding: 6px 12px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      border: 1px solid #1a1a4e;
    }

    .chord-chip .remove-chord {
      background: #e94560;
      color: white;
      border: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .pipeline-status {
      background: #16213e;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #0f3460;
    }

    .pipeline-status h2 {
      color: #00d4ff;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    .pass-stages {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .pass-card {
      background: #0f3460;
      border-radius: 8px;
      padding: 15px;
      border: 1px solid #1a1a4e;
      transition: border-color 0.2s;
    }

    .pass-card.active {
      border-color: #00d4ff;
    }

    .pass-card.completed {
      border-color: #4ecca3;
    }

    .pass-card.failed {
      border-color: #e94560;
    }

    .pass-card h3 {
      color: #00d4ff;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }

    .pass-card .metrics {
      font-size: 0.8rem;
      color: #a0a0a0;
    }

    .pass-card .metrics .score {
      color: #4ecca3;
      font-weight: bold;
    }

    .pass-card .note-count {
      color: #e0e0e0;
      font-size: 0.85rem;
      margin-top: 5px;
    }

    .visualization {
      background: #16213e;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #0f3460;
    }

    .visualization h2 {
      color: #00d4ff;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    .stage-tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .stage-tab {
      background: #0f3460;
      color: #a0a0a0;
      border: 1px solid #1a1a4e;
      padding: 6px 14px;
      border-radius: 5px 5px 0 0;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .stage-tab.active {
      background: #00d4ff;
      color: #1a1a2e;
    }

    .stage-content {
      background: #0f3460;
      border-radius: 0 8px 8px 8px;
      padding: 15px;
      min-height: 150px;
    }

    .note-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .note-chip {
      background: #1a1a4e;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      border: 1px solid #2a2a5e;
    }

    .note-chip.structural {
      border-color: #00d4ff;
      color: #00d4ff;
    }

    .note-chip.cadence {
      border-color: #4ecca3;
      color: #4ecca3;
    }

    .note-chip.connector {
      border-color: #f0a500;
      color: #f0a500;
    }

    .note-chip.ornament {
      border-color: #e94560;
      color: #e94560;
    }

    .note-chip.expectation {
      border-color: #a855f7;
      color: #a855f7;
    }

    .piano-roll {
      background: #0a0a1a;
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
      min-height: 200px;
      position: relative;
      overflow-x: auto;
    }

    .piano-roll canvas {
      display: block;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .execution-log {
      background: #0a0a1a;
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
      font-family: monospace;
      font-size: 0.8rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .log-entry {
      padding: 3px 0;
      border-bottom: 1px solid #1a1a4e;
    }

    .log-entry.success {
      color: #4ecca3;
    }

    .log-entry.warning {
      color: #f0a500;
    }

    .log-entry.error {
      color: #e94560;
    }

    .empty-state {
      text-align: center;
      color: #a0a0a0;
      padding: 40px;
      font-style: italic;
    }

    .issues-list {
      margin-top: 8px;
    }

    .issues-list li {
      color: #e94560;
      font-size: 0.75rem;
      list-style: disc;
      margin-left: 15px;
    }

    .regenerate-btn {
      margin-left: 8px;
    }

    .data-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin: 15px 0;
    }

    .summary-stat {
      background: #1a1a4e;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #2a2a5e;
    }

    .summary-stat .label {
      color: #a0a0a0;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .summary-stat .value {
      color: #00d4ff;
      font-size: 0.9rem;
      font-weight: bold;
      display: block;
      margin-top: 4px;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 0.8rem;
    }

    .data-table th {
      background: #1a1a4e;
      color: #00d4ff;
      padding: 8px 10px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid #00d4ff;
    }

    .data-table td {
      padding: 6px 10px;
      border-bottom: 1px solid #1a1a4e;
      color: #e0e0e0;
    }

    .data-table tr:hover td {
      background: #0f3460;
    }

    .data-table td:nth-child(2) {
      font-family: monospace;
      color: #4ecca3;
    }

    .data-table td:nth-child(3) {
      font-family: monospace;
      color: #f0a500;
    }

    .data-table td:nth-child(4),
    .data-table td:nth-child(5) {
      font-family: monospace;
      color: #a855f7;
    }

    .chord-bar {
      background: #0a0a1a;
      border: 1px solid #2a2a5e;
      border-radius: 6px;
      padding: 8px 12px;
      margin: 10px 0;
      font-family: monospace;
      font-size: 0.8rem;
      color: #4ecca3;
      letter-spacing: 0.5px;
    }

    .fixture-panel {
      background: #16213e;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #0f3460;
    }

    .fixture-panel h2 {
      color: #00d4ff;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    .toggle-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: #a0a0a0;
      cursor: pointer;
    }

    .toggle-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #00d4ff;
      cursor: pointer;
    }

    .fixture-controls {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .data-flow-indicator {
      background: #0a0a1a;
      border: 1px solid #2a2a5e;
      border-radius: 6px;
      padding: 12px 15px;
      margin-top: 15px;
      font-family: monospace;
      font-size: 0.75rem;
      color: #a0a0a0;
    }

    .data-flow-indicator .flow-step {
      color: #4ecca3;
    }

    .data-flow-indicator .flow-arrow {
      color: #00d4ff;
    }

    .data-flow-indicator .flow-data {
      color: #f0a500;
    }

    .fixture-chord-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .fixture-chord-chip {
      background: #0f3460;
      padding: 5px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      border: 1px solid #1a1a4e;
      color: #4ecca3;
    }

    .fixture-chord-chip.bass {
      border-color: #a855f7;
      color: #a855f7;
    }

    .fixture-chord-chip.drum {
      border-color: #f0a500;
      color: #f0a500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Melody Generator - 6-Pass Pipeline</h1>

    <div class="input-panel">
      <h2>Configuration</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="chord-root">Chord Root</label>
          <select id="chord-root">
            <option value="C">C</option>
            <option value="C#">C#</option>
            <option value="D">D</option>
            <option value="D#">D#</option>
            <option value="E">E</option>
            <option value="F">F</option>
            <option value="F#">F#</option>
            <option value="G">G</option>
            <option value="G#">G#</option>
            <option value="A">A</option>
            <option value="A#">A#</option>
            <option value="B">B</option>
          </select>
        </div>
        <div class="form-group">
          <label for="chord-quality">Quality</label>
          <select id="chord-quality">
            <option value="maj">Major</option>
            <option value="min">Minor</option>
            <option value="dim">Diminished</option>
            <option value="aug">Augmented</option>
            <option value="7">Dominant 7th</option>
            <option value="maj7">Major 7th</option>
          </select>
        </div>
        <div class="form-group">
          <label for="chord-beat">Beat Start</label>
          <input type="number" id="chord-beat" value="0" min="0" step="1">
        </div>
        <button onclick="addChord()">Add Chord</button>
        <button class="secondary" onclick="add145Progression()">1-4-5 Progression</button>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="phrase-role">Phrase Role</label>
          <select id="phrase-role">
            <option value="statement">Statement</option>
            <option value="build">Build</option>
            <option value="climax">Climax</option>
            <option value="release">Release</option>
            <option value="resolution">Resolution</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tension-level">Tension Level (0-1)</label>
          <input type="number" id="tension-level" value="0.5" min="0" max="1" step="0.1">
        </div>
        <div class="form-group">
          <label for="is-antecedent">Antecedent Phrase</label>
          <select id="is-antecedent">
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tuning-system">Tuning System</label>
          <select id="tuning-system">
            <option value="12tet">12-TET (Standard)</option>
            <option value="quartertone">Quarter-Tone (24-TET)</option>
            <option value="just">Just Intonation</option>
            <option value="pythagorean">Pythagorean Tuning</option>
          </select>
        </div>
        <div class="form-group">
          <label for="pitch-diversity-weight">Pitch Diversity: 0%</label>
          <input type="range" id="pitch-diversity-weight" value="0" min="0" max="100" step="1" oninput="document.getElementById('pitch-diversity-label').textContent='Pitch Diversity: '+this.value+'%'">
        </div>
      </div>

      <div class="chord-list" id="chord-list"></div>
    </div>

    <div class="fixture-panel">
      <h2>Random Progression Generator</h2>
      <div class="fixture-controls">
        <div class="form-group">
          <label for="fixture-count">Number of Chords</label>
          <input type="number" id="fixture-count" value="4" min="1" max="32" step="1">
        </div>
        <div class="form-group">
          <label for="fixture-beat-increment">Beat Increment</label>
          <input type="number" id="fixture-beat-increment" value="2" min="1" max="8" step="1">
        </div>
        <div class="form-group">
          <label for="fixture-density">Density (0-1)</label>
          <input type="number" id="fixture-density" value="0.5" min="0" max="1" step="0.05">
        </div>
        <div class="form-group">
          <label for="fixture-genre">Genre</label>
          <select id="fixture-genre">
            <option value="none">Standard</option>
            <option value="baroque">Baroque</option>
            <option value="classical">Classical</option>
            <option value="jazz">Jazz</option>
            <option value="pop">Pop</option>
          </select>
        </div>
        <div class="toggle-group">
          <label class="toggle-label">
            <input type="checkbox" id="fixture-with-bass" checked> Generate Bass Track
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="fixture-with-drums" checked> Generate Drum Track
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="fixture-complex" checked> Complex Patterns (arps, transitions)
          </label>
        </div>
        <button onclick="generateRandomProgressionUI()">Generate Random Progression</button>
        <button class="secondary" onclick="clearFixtureProgression()">Clear</button>
      </div>
      <div class="data-flow-indicator" id="fixture-flow" style="display: none;"></div>
      <div class="fixture-chord-list" id="fixture-chord-list"></div>
    </div>

    <div class="input-panel">
      <h2>Pipeline Execution</h2>
      <div class="form-row">
        <button onclick="runPipeline()">Run 6-Pass Pipeline</button>
        <button class="secondary" onclick="testMicrotonalEngine()">Test Microtonal Engine</button>
        <button class="secondary" onclick="testMotifEngine()">Test Motif Engine</button>
        <button class="secondary" onclick="testStyleEngine()">Test Style Engine</button>
        <button class="secondary" onclick="testRhythmEngine()">Test Rhythm Engine</button>
        <button class="secondary" onclick="resetAll()">Reset</button>
        <button class="secondary" onclick="runAllTests()">Run All Tests</button>
      </div>
    </div>

    <div class="pipeline-status" id="pipeline-status" style="display: none;">
      <h2>Pass Results</h2>
      <div class="pass-stages" id="pass-stages"></div>
      <div class="execution-log" id="execution-log"></div>
    </div>

    <div class="visualization" id="visualization" style="display: none;">
      <h2>Stage Visualization</h2>
      <div class="stage-tabs" id="stage-tabs"></div>
      <div class="stage-content" id="stage-content">
        <div class="empty-state">Run the pipeline to see results</div>
      </div>
      <div class="controls">
        <button onclick="playMelody()">Play Melody</button>
        <button class="secondary" onclick="stopPlayback()">Stop</button>
      </div>
      <div class="piano-roll" id="piano-roll" style="display: none;">
        <canvas id="piano-canvas"></canvas>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
