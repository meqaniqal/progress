<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melody Generator (mgen) - Playground</title>
  <style>
    :root {
      --bg: #0d0e12;
      --panel-bg: #15171f;
      --border: #222533;
      --text: #e2e8f0;
      --text-muted: #8892b0;
      --accent: #00e5ff;
      --accent-hover: #33ebff;
      --danger: #ff5252;
      --danger-hover: #ff7373;
      --success: #00e676;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      line-height: 1.5;
    }

    h1, h2, h3 {
      margin-top: 0;
      color: var(--accent);
      font-weight: 600;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .settings-section-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
      margin-bottom: 12px;
      grid-column: 1 / -1;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    input, select {
      background: #1e2230;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    input[type="checkbox"] {
      width: auto;
      margin-right: 5px;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      margin-top: 10px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text);
    }

    /* Actions Panel */
    .actions-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 25px;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px 20px;
    }

    button {
      background: var(--accent);
      color: #0b0c10;
      border: none;
      padding: 10px 20px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover {
      background: var(--accent-hover);
    }
    button:active {
      transform: scale(0.98);
    }

    button.secondary {
      background: #1e2230;
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.secondary:hover {
      background: #272c3e;
      border-color: var(--text-muted);
    }

    /* Output Results styling */
    .chord-bar {
      background: #1a1e2d;
      border: 1px dashed var(--border);
      color: var(--accent);
      padding: 12px 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 1.05rem;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .data-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .summary-stat {
      background: #12141c;
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: 8px;
    }
    .summary-stat .label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .summary-stat .value {
      font-size: 0.95rem;
      font-weight: bold;
      font-family: monospace;
    }

    .note-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }

    .note-chip {
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-family: monospace;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .note-chip.structural { background: rgba(0, 229, 255, 0.15); color: #00e5ff; }
    .note-chip.cadence { background: rgba(0, 230, 118, 0.15); color: #00e676; }
    .note-chip.connector { background: rgba(255, 167, 38, 0.15); color: #ffa726; }
    .note-chip.ornament { background: rgba(255, 82, 82, 0.15); color: #ff5252; }
    .note-chip.expectation { background: rgba(171, 71, 188, 0.15); color: #ab47bc; }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      margin-bottom: 25px;
      font-size: 0.9rem;
    }
    .data-table th, .data-table td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .data-table th {
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
    }
    .data-table tbody tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .piano-roll {
      width: 100%;
      overflow-x: auto;
      background: #09090b;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      margin-top: 20px;
    }
    canvas {
      display: block;
      background: #070709;
    }

    /* Diagnostics Log collapsing */
    details {
      margin-top: 30px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0f1016;
    }
    details summary {
      padding: 12px 15px;
      cursor: pointer;
      font-weight: bold;
      color: var(--text-muted);
      outline: none;
    }
    details[open] summary {
      border-bottom: 1px solid var(--border);
    }

    .execution-log {
      font-family: monospace;
      padding: 15px;
      max-height: 250px;
      overflow-y: auto;
      font-size: 0.8rem;
      white-space: pre-wrap;
      background: #070709;
      color: #9cdcfe;
    }

    /* Hide elements to maintain app.js compatibility without errors */
    #stage-tabs, #pass-stages, #chord-list, #fixture-flow, #fixture-chord-list {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>mgen Melody Generator</h1>
      <a href="fulltest.html">Full Debug Suite →</a>
    </div>

    <!-- Generator Control Parameters Card -->
    <div class="panel">
      <div class="settings-grid">
        <div class="settings-section-title">Melody Context</div>
        <div class="form-group">
          <label for="phrase-role">Phrase Role</label>
          <select id="phrase-role">
            <option value="statement">Statement</option>
            <option value="response">Response</option>
            <option value="climax">Climax</option>
            <option value="dissolve">Dissolve</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tuning-system">Tuning System</label>
          <select id="tuning-system">
            <option value="12tet">12-TET (Standard)</option>
            <option value="quartertone">Quarter-Tone (24-TET)</option>
            <option value="just">Just Intonation</option>
            <option value="pythagorean">Pythagorean Tuning</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tension-level">Tension Level (0-1)</label>
          <input type="range" id="tension-level" min="0" max="1" step="0.05" value="0.5">
        </div>
        <div class="form-group">
          <label for="is-antecedent">Phrase Closure</label>
          <select id="is-antecedent">
            <option value="true">Antecedent (Open Ending)</option>
            <option value="false">Consequent (Resolved Ending)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="pitch-diversity-weight" id="pitch-diversity-label">Pitch Diversity: 0%</label>
          <input type="range" id="pitch-diversity-weight" min="0" max="100" step="1" value="0" oninput="document.getElementById('pitch-diversity-label').textContent='Pitch Diversity: '+this.value+'%'">
        </div>

        <div class="settings-section-title">Progression & Track Setup</div>
        <div class="form-group">
          <label for="fixture-count">Number of Chords</label>
          <input type="number" id="fixture-count" value="6" min="1" max="16">
        </div>
        <div class="form-group">
          <label for="fixture-beat-increment">Beats Per Chord</label>
          <input type="number" id="fixture-beat-increment" value="2" min="1" max="8">
        </div>
        <div class="form-group">
          <label for="fixture-density">Melody Density (0-1)</label>
          <input type="number" id="fixture-density" value="0.5" min="0" max="1" step="0.05">
        </div>
        <div class="form-group">
          <label for="fixture-genre">Genre Style Profile</label>
          <select id="fixture-genre">
            <option value="none">Standard</option>
            <option value="baroque">Baroque</option>
            <option value="classical">Classical</option>
            <option value="jazz">Jazz</option>
            <option value="pop">Pop</option>
          </select>
        </div>
      </div>
      
      <div class="checkbox-group">
        <label class="checkbox-label"><input type="checkbox" id="fixture-with-bass" checked> Bass Accompaniment</label>
        <label class="checkbox-label"><input type="checkbox" id="fixture-with-drums" checked> Drum Track</label>
        <label class="checkbox-label"><input type="checkbox" id="fixture-complex" checked> Complex Accompaniment Patterns</label>
      </div>
    </div>

    <!-- Actions Area -->
    <div class="actions-bar">
      <button id="generate-btn" onclick="generateRandomProgressionUI()">Generate Melody</button>
      <button id="play-btn" class="secondary" onclick="playMelody()" style="display: none;">Play Melody</button>
      <button id="stop-btn" class="secondary" onclick="stopPlayback()" style="display: none;">Stop</button>
      <button id="copy-btn" class="secondary" onclick="copyResultsToClipboard()" style="display: none;">Copy Results</button>
      <button class="secondary" onclick="clearFixtureProgression()">Clear</button>
    </div>

    <!-- Output & Results Section -->
    <div class="panel" id="visualization" style="display: none;">
      <h2>Generated Output</h2>
      <!-- Renders Chords, Stats and Table -->
      <div id="stage-content">
        <div class="empty-state">Generate a melody to view notes.</div>
      </div>
      
      <!-- Visual Piano Roll -->
      <div class="piano-roll" id="piano-roll" style="display: none;">
        <canvas id="piano-canvas"></canvas>
      </div>

      <!-- Notes Table -->
      <div id="table-content" style="margin-top: 20px;"></div>
    </div>

    <!-- Hidden compatibility elements -->
    <div id="stage-tabs" style="display: none;"></div>
    <div id="pass-stages" style="display: none;"></div>
    <div id="fixture-flow" style="display: none;"></div>
    <div id="fixture-chord-list" style="display: none;"></div>
    <div style="display: none;">
      <select id="chord-root"><option value="C">C</option></select>
      <select id="chord-quality"><option value="maj">maj</option></select>
      <input type="number" id="chord-beat" value="0">
      <div id="chord-list"></div>
    </div>

    <!-- Collapsible Diagnostics Console -->
    <details id="pipeline-status" style="display: none;">
      <summary>System Console Logs & Pipeline Stages</summary>
      <div class="execution-log" id="execution-log"></div>
    </details>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
